name: Build Android APK

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-rust:
    name: Build Rust Native Library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            rust/target
          key: ${{ runner.os }}-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Build for arm64-v8a
        working-directory: rust
        run: cargo ndk -t arm64-v8a build --release

      - name: Build for armeabi-v7a
        working-directory: rust
        run: cargo ndk -t armeabi-v7a build --release

      - name: Build for x86_64
        working-directory: rust
        run: cargo ndk -t x86_64 build --release

      - name: Build for x86
        working-directory: rust
        run: cargo ndk -t x86 build --release

      - name: Create jniLibs directories
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          mkdir -p app/src/main/jniLibs/armeabi-v7a
          mkdir -p app/src/main/jniLibs/x86_64
          mkdir -p app/src/main/jniLibs/x86

      - name: Copy native libraries
        run: |
          cp rust/target/aarch64-linux-android/release/libNeoLibDumper.so app/src/main/jniLibs/arm64-v8a/
          cp rust/target/armv7-linux-androideabi/release/libNeoLibDumper.so app/src/main/jniLibs/armeabi-v7a/
          cp rust/target/x86_64-linux-android/release/libNeoLibDumper.so app/src/main/jniLibs/x86_64/
          cp rust/target/i686-linux-android/release/libNeoLibDumper.so app/src/main/jniLibs/x86/

      - name: Upload native libraries artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-libs
          path: app/src/main/jniLibs/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download native libraries
        uses: actions/download-artifact@v4
        with:
          name: native-libs
          path: app/src/main/jniLibs/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LibDumper-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: LibDumper-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-android
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: LibDumper-debug
          path: ./artifacts

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: LibDumper-release
          path: ./artifacts

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Lib Dumper v${{ steps.version.outputs.version }}
          body: |
            ## Lib Dumper v${{ steps.version.outputs.version }}
            
            Android ELF Analysis & Symbol Dumper
            
            ### Changes
            - Initial release
            
            ### Downloads
            - **Debug APK**: For testing and development
            - **Release APK**: For production use (unsigned)
          files: |
            ./artifacts/app-debug.apk
            ./artifacts/app-release-unsigned.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
