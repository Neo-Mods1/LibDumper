name: Clear All Caches

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  clear-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Clear all GitHub Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            let totalDeleted = 0;
            let page = 1;
            
            while (true) {
              const caches = await github.rest.actions.getActionsCacheList({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                page: page
              });
              
              if (caches.data.actions_caches.length === 0) break;
              
              console.log(`Page ${page}: found ${caches.data.actions_caches.length} caches`);
              
              for (const cache of caches.data.actions_caches) {
                try {
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    cache_id: cache.id
                  });
                  totalDeleted++;
                  console.log(`Deleted: ${cache.key}`);
                } catch (e) {
                  console.log(`Failed: ${cache.key} - ${e.message}`);
                }
              }
              
              if (caches.data.actions_caches.length < 100) break;
              page++;
            }
            
            console.log(`Total deleted: ${totalDeleted}`);
