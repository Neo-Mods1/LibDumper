name: Clear All Caches

on:
  workflow_dispatch:

jobs:
  clear-caches:
    runs-on: ubuntu-latest
    steps:
      - name: Clear all GitHub Actions caches
        uses: actions/github-script@v7
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            console.log(`Found ${caches.data.total_count} caches`);
            
            if (caches.data.total_count === 0) {
              console.log('No caches to delete');
              return;
            }
            
            let deleted = 0;
            for (const cache of caches.data.actions_caches) {
              try {
                await github.rest.actions.deleteActionsCacheById({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  cache_id: cache.id
                });
                deleted++;
                console.log(`Deleted cache: ${cache.key} (id: ${cache.id})`);
              } catch (e) {
                console.log(`Failed to delete ${cache.key}: ${e.message}`);
              }
            }
            
            console.log(`Deleted ${deleted}/${caches.data.total_count} caches`);
            
            // If there are more pages, keep going
            if (caches.data.total_count > 100) {
              console.log('More than 100 caches, run again to clear remaining');
            }
